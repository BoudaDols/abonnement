openapi: 3.0.3
info:
  title: Abonnement API
  description: |
    A lightweight PHP REST API to manage subscriptions (free and paid).
    Authentication is delegated to an external API gateway which injects `user_id` directly into requests.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api
    description: Local development
  - url: http://your-domain/api
    description: Production

tags:
  - name: Plans
    description: Subscription plans
  - name: Subscriptions
    description: User subscriptions
  - name: Payments
    description: Payment processing
  - name: Webhooks
    description: Payment gateway webhooks

paths:
  /plans:
    get:
      tags: [Plans]
      summary: List all active plans
      responses:
        '200':
          description: List of active plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'

  /plans/{id}:
    get:
      tags: [Plans]
      summary: Get a plan by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/NotFound'

  /subscriptions:
    post:
      tags: [Subscriptions]
      summary: Subscribe to a plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, plan_id]
              properties:
                user_id:
                  type: integer
                  example: 42
                plan_id:
                  type: integer
                  example: 2
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get a subscription by ID
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Subscription found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Subscriptions]
      summary: Cancel a subscription
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Subscription canceled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Subscription canceled
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /payments:
    get:
      tags: [Payments]
      summary: List payment history for a user
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
          example: 42
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    post:
      tags: [Payments]
      summary: Process a payment for a pending subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_id, amount]
              properties:
                subscription_id:
                  type: integer
                  example: 1
                amount:
                  type: number
                  format: float
                  example: 4.99
                currency:
                  type: string
                  example: usd
                  default: usd
      responses:
        '201':
          description: Payment processed and subscription activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          description: Payment gateway error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook endpoint
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /webhooks/paypal:
    post:
      tags: [Webhooks]
      summary: PayPal webhook endpoint
      parameters:
        - name: PAYPAL-TRANSMISSION-ID
          in: header
          required: true
          schema:
            type: string
        - name: PAYPAL-TRANSMISSION-TIME
          in: header
          required: true
          schema:
            type: string
        - name: PAYPAL-TRANSMISSION-SIG
          in: header
          required: true
          schema:
            type: string
        - name: PAYPAL-CERT-URL
          in: header
          required: true
          schema:
            type: string
        - name: PAYPAL-AUTH-ALGO
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  schemas:
    Plan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pro
        type:
          type: string
          enum: [free, paid]
          example: paid
        price:
          type: string
          example: "9.99"
        duration_days:
          type: integer
          example: 30
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 42
        plan_id:
          type: integer
          example: 2
        status:
          type: string
          enum: [active, pending, expired, canceled]
          example: active
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        plan:
          $ref: '#/components/schemas/Plan'

    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        subscription_id:
          type: integer
          example: 1
        amount:
          type: string
          example: "4.99"
        status:
          type: string
          enum: [pending, paid, failed]
          example: paid
        transaction_id:
          type: string
          example: pi_stripe_123456
        paid_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
          example: Error message

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not found
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Validation error message
    Unauthorized:
      description: Invalid webhook signature
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Invalid signature
